<div class="page">
  <h2>Add New Category</h2>

  <form (ngSubmit)="onSubmit()" #categoryForm="ngForm" class="form-card">
    <div class="form-group">
      <label for="name">Category Name</label>
      <input
        type="text"
        id="name"
        name="name"
        class="form-control"
        [(ngModel)]="category.name"
        required
        placeholder="e.g. Food & Dining"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!categoryForm.valid">Save Category</button>
      <a routerLink="/categories" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
