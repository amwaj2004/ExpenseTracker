<div class="page">
  <h2>Edit Expense</h2>

  @if (errorMessage) {
    <p class="error-msg">{{ errorMessage }}</p>
  }

  <form (ngSubmit)="onSubmit()" #expenseForm="ngForm" class="form-card">
    <div class="form-group">
      <label for="description">Description</label>
      <input
        type="text"
        id="description"
        name="description"
        class="form-control"
        [(ngModel)]="expense.description"
        required
      />
    </div>

    <div class="form-group">
      <label for="amount">Amount ($)</label>
      <input
        type="number"
        id="amount"
        name="amount"
        class="form-control"
        [(ngModel)]="expense.amount"
        min="0.01"
        step="0.01"
        required
      />
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input
        type="date"
        id="date"
        name="date"
        class="form-control"
        [(ngModel)]="expense.date"
      />
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" name="category" class="form-control" [(ngModel)]="expense.category">
        <option value="">-- No Category --</option>
        @for (cat of categories; track cat._id) {
          <option [value]="cat._id">{{ cat.name }}</option>
        }
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!expenseForm.valid">Update Expense</button>
      <a routerLink="/expenses" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
